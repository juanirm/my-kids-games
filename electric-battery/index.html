<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Electric Battery — My Kids Games</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <header>
    <a class="back" href="/">← Back</a>
    <h1>Electric Battery</h1>
  </header>
  <main class="game-page">
    <section id="pads" class="pads-grid" aria-label="Drum pads">
      <!-- 8 pads -->
    </section>

    <section class="controls">
      <button id="play" aria-label="Play">Play</button>
      <label>BPM <input id="bpm" type="range" min="60" max="180" value="120"></label>
      <button id="record" aria-label="Record sample">Record Sample</button>
      <button id="save" aria-label="Save preset">Save Preset</button>
    </section>

    <section id="keyboard" class="keyboard" aria-label="Piano">
      <!-- small piano -->
    </section>

    <section id="harp" class="harp" aria-label="Harp">
      <!-- harp strings -->
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/tone@14.8.39/build/Tone.min.js"></script>
  <script src="/js/game.js"></script>
</body>
</html>
